# Render Blueprint: https://render.com/docs/blueprint-spec
# Deploy: Dashboard → New → Blueprint → connect repository

databases:
  - name: visits-db
    plan: free
    databaseName: visits
    user: visits

services:
  - type: web
    name: amopoint-tracker
    runtime: docker
    plan: free
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: FORCE_HTTPS
        value: "true"
      - key: LOG_CHANNEL
        value: stderr
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: visits-db
          property: connectionString
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: RUN_SEED
        value: "true"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: TRACKER_ALLOWED_ORIGIN
        value: "*"
      - key: TRACKER_COOKIE_SECURE
        value: "true"
      - key: TRACKER_COOKIE_SAMESITE
        value: none
